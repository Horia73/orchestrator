services:
  orchestrator:
    build:
      context: .
      args:
        ORCHESTRATOR_BUILD_COMMIT: ${ORCHESTRATOR_BUILD_COMMIT:-unknown}
        ORCHESTRATOR_BUILD_REF: ${ORCHESTRATOR_BUILD_REF:-unknown}
        # Persist BuildKit cache metadata inside the tagged image. Managed
        # updates intentionally prune the external builder cache to protect the
        # small eMMC root disk; inline metadata lets the next build recover
        # stable layers from the live/rollback images anyway.
        BUILDKIT_INLINE_CACHE: "1"
      cache_from:
        - orchestrator:local
        - orchestrator:rollback
    image: orchestrator:local
    restart: unless-stopped
    # Run as the host user so bind-mounted files are owned by the user, not by
    # uid 1000. install.sh sets ORCHESTRATOR_UID/GID; defaults to 1000:1000
    # (the `node` user baked into the image) for standalone dev.
    user: "${ORCHESTRATOR_UID:-1000}:${ORCHESTRATOR_GID:-1000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ORCHESTRATOR_SERVICE_MANAGER: docker
      ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS: ${ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS:-172.16.0.0/12}
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: "3000"
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-}
      # AI/model work runs in a separate service. Rebuilding this web service
      # therefore drops only the client proxy connection; the accepted turn
      # continues in its owning blue/green generation and the UI reattaches
      # from persisted snapshots + both worker event streams.
      ORCHESTRATOR_AI_WORKER_URL: http://ai-worker:3100
      ORCHESTRATOR_AI_WORKER_REGISTRY_PATH: /app/.orchestrator/ai-worker-generations.json
      ORCHESTRATOR_SELF_DEV_SOURCE_DIR: /orchestrator-source
      PORT: "3000"
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      PATCHRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      BROWSER_AGENT_LIVE_VIEW: "1"
      BROWSER_AGENT_VNC_WS_HOST: 0.0.0.0
      BROWSER_AGENT_VNC_WS_PORT: "6080"
      BROWSER_AGENT_VNC_WS_PUBLIC_URL: ${BROWSER_AGENT_VNC_WS_PUBLIC_URL:-ws://127.0.0.1:6080}
      WHATSAPP_CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      - "127.0.0.1:${ORCHESTRATOR_PORT:-3000}:3000"
    depends_on:
      ai-worker:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Bind mounts to host paths set by install.sh. Defaults are relative to the
    # compose file for standalone dev (both paths are gitignored).
    volumes:
      - ${ORCHESTRATOR_DATA_DIR:-./.orchestrator-data}:/app/.orchestrator
      - ${ORCHESTRATOR_NODE_HOME:-./.orchestrator-node-home}:/home/node
      - ${ORCHESTRATOR_SELF_DEV_HOST_SOURCE_DIR:-.}:/orchestrator-source

  ai-worker:
    # Blue worker slot. This canonical service also owns the stable public VNC
    # router on :6080; browser framebuffers themselves listen on :6082 in each
    # generation. Keeping the router binding here preserves compatibility with
    # installs that predate blue/green handoff.
    image: orchestrator:local
    restart: unless-stopped
    user: "${ORCHESTRATOR_UID:-1000}:${ORCHESTRATOR_GID:-1000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ORCHESTRATOR_SERVICE_MANAGER: docker
      ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS: ${ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS:-172.16.0.0/12}
      ORCHESTRATOR_AI_WORKER_PROCESS: "1"
      ORCHESTRATOR_AI_WORKER_ID: blue
      ORCHESTRATOR_AI_WORKER_URL: http://ai-worker:3100
      ORCHESTRATOR_AI_WORKER_REGISTRY_PATH: /app/.orchestrator/ai-worker-generations.json
      ORCHESTRATOR_AI_VNC_ROUTER: "1"
      ORCHESTRATOR_AI_VNC_ROUTER_PORT: "6080"
      ORCHESTRATOR_AI_WORKER_VNC_PORT: "6082"
      ORCHESTRATOR_AI_WORKER_BLUE_HOST: ai-worker
      ORCHESTRATOR_AI_WORKER_GREEN_HOST: ai-worker-green
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: "3100"
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-}
      ORCHESTRATOR_SELF_DEV_SOURCE_DIR: /orchestrator-source
      PORT: "3100"
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      PATCHRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      BROWSER_AGENT_LIVE_VIEW: "1"
      BROWSER_AGENT_VNC_WS_HOST: 0.0.0.0
      BROWSER_AGENT_VNC_WS_PORT: "6082"
      BROWSER_AGENT_VNC_WS_PUBLIC_URL: ${BROWSER_AGENT_VNC_WS_PUBLIC_URL:-ws://127.0.0.1:6080}
      WHATSAPP_CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      # Control is host-loopback only; the host bridge uses it to drain and
      # rotate the worker without exposing the worker API publicly.
      - "127.0.0.1:${ORCHESTRATOR_AI_WORKER_HOST_PORT:-3101}:3100"
      - "127.0.0.1:${BROWSER_AGENT_VNC_WS_PORT:-6080}:6080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ORCHESTRATOR_DATA_DIR:-./.orchestrator-data}:/app/.orchestrator
      - ${ORCHESTRATOR_NODE_HOME:-./.orchestrator-node-home}:/home/node
      - ${ORCHESTRATOR_SELF_DEV_HOST_SOURCE_DIR:-.}:/orchestrator-source
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://127.0.0.1:3100/api/ping >/dev/null"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 6

  ai-worker-green:
    # Inactive slot started only by the managed updater. After an atomic
    # registry cutover it accepts every new AI request while the previous slot
    # drains its already-accepted trees on the old image.
    profiles: ["ai-handoff"]
    image: orchestrator:local
    restart: unless-stopped
    user: "${ORCHESTRATOR_UID:-1000}:${ORCHESTRATOR_GID:-1000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ORCHESTRATOR_SERVICE_MANAGER: docker
      ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS: ${ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS:-172.16.0.0/12}
      ORCHESTRATOR_AI_WORKER_PROCESS: "1"
      ORCHESTRATOR_AI_WORKER_ID: green
      ORCHESTRATOR_AI_WORKER_URL: http://ai-worker-green:3100
      ORCHESTRATOR_AI_WORKER_REGISTRY_PATH: /app/.orchestrator/ai-worker-generations.json
      ORCHESTRATOR_AI_VNC_ROUTER: "0"
      ORCHESTRATOR_AI_VNC_ROUTER_PORT: "6080"
      ORCHESTRATOR_AI_WORKER_VNC_PORT: "6082"
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: "3100"
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-}
      ORCHESTRATOR_SELF_DEV_SOURCE_DIR: /orchestrator-source
      PORT: "3100"
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      PATCHRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      BROWSER_AGENT_LIVE_VIEW: "1"
      BROWSER_AGENT_VNC_WS_HOST: 0.0.0.0
      BROWSER_AGENT_VNC_WS_PORT: "6082"
      BROWSER_AGENT_VNC_WS_PUBLIC_URL: ${BROWSER_AGENT_VNC_WS_PUBLIC_URL:-ws://127.0.0.1:6080}
      WHATSAPP_CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      - "127.0.0.1:${ORCHESTRATOR_AI_WORKER_GREEN_HOST_PORT:-3102}:3100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ORCHESTRATOR_DATA_DIR:-./.orchestrator-data}:/app/.orchestrator
      - ${ORCHESTRATOR_NODE_HOME:-./.orchestrator-node-home}:/home/node
      - ${ORCHESTRATOR_SELF_DEV_HOST_SOURCE_DIR:-.}:/orchestrator-source
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://127.0.0.1:3100/api/ping >/dev/null"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 6
