services:
  orchestrator:
    build:
      context: .
      args:
        ORCHESTRATOR_BUILD_COMMIT: ${ORCHESTRATOR_BUILD_COMMIT:-unknown}
        ORCHESTRATOR_BUILD_REF: ${ORCHESTRATOR_BUILD_REF:-unknown}
        # Persist BuildKit cache metadata inside the tagged image. Managed
        # updates intentionally prune the external builder cache to protect the
        # small eMMC root disk; inline metadata lets the next build recover
        # stable layers from the live/rollback images anyway.
        BUILDKIT_INLINE_CACHE: "1"
      cache_from:
        - orchestrator:local
        - orchestrator:rollback
    image: orchestrator:local
    restart: unless-stopped
    # Run as the host user so bind-mounted files are owned by the user, not by
    # uid 1000. install.sh sets ORCHESTRATOR_UID/GID; defaults to 1000:1000
    # (the `node` user baked into the image) for standalone dev.
    user: "${ORCHESTRATOR_UID:-1000}:${ORCHESTRATOR_GID:-1000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ORCHESTRATOR_SERVICE_MANAGER: docker
      ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS: ${ORCHESTRATOR_TRUSTED_LOOPBACK_FORWARDERS:-172.16.0.0/12}
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: "3000"
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-}
      ORCHESTRATOR_SELF_DEV_SOURCE_DIR: /orchestrator-source
      PORT: "3000"
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      PATCHRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      BROWSER_AGENT_LIVE_VIEW: "1"
      BROWSER_AGENT_VNC_WS_HOST: 0.0.0.0
      BROWSER_AGENT_VNC_WS_PORT: "6080"
      BROWSER_AGENT_VNC_WS_PUBLIC_URL: ${BROWSER_AGENT_VNC_WS_PUBLIC_URL:-ws://127.0.0.1:6080}
      WHATSAPP_CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      - "127.0.0.1:${ORCHESTRATOR_PORT:-3000}:3000"
      - "127.0.0.1:${BROWSER_AGENT_VNC_WS_PORT:-6080}:6080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Bind mounts to host paths set by install.sh. Defaults are relative to the
    # compose file for standalone dev (both paths are gitignored).
    volumes:
      - ${ORCHESTRATOR_DATA_DIR:-./.orchestrator-data}:/app/.orchestrator
      - ${ORCHESTRATOR_NODE_HOME:-./.orchestrator-node-home}:/home/node
      - ${ORCHESTRATOR_SELF_DEV_HOST_SOURCE_DIR:-.}:/orchestrator-source
